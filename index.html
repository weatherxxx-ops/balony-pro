<!DOCTYPE html>
<html>
<script>
let map = L.map('map').setView([52.3, 23.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// punkty
let grodno = [53.6694, 23.8131];
let bialystok = [53.1325, 23.1688];
let brzesc = [52.0976, 23.7341];
let lublin = [51.2465, 22.5684];

function drawLine(from, direction, speed, color) {
    let distance = speed * 0.1;

    let lat2 = from[0] + distance * Math.cos(direction * Math.PI/180);
    let lon2 = from[1] + distance * Math.sin(direction * Math.PI/180);

    L.polyline([from, [lat2, lon2]], {color: color}).addTo(map);
}

// 🔥 JEDNA poprawna funkcja
function getDirection(fromLat, fromLon, toLat, toLon) {
    const dLon = (toLon - fromLon) * Math.PI / 180;
    const lat1 = fromLat * Math.PI / 180;
    const lat2 = toLat * Math.PI / 180;

    const y = Math.sin(dLon) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) -
              Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);

    let brng = Math.atan2(y, x) * 180 / Math.PI;
    return (brng + 360) % 360; // ✅ zawsze 0–360
}

async function check(lat, lon, el, name, target) {
    let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=winddirection_10m,windspeed_10m`);
    let data = await res.json();

    let dir = (data.current.winddirection_10m + 360) % 360;
    let speed = data.current.windspeed_10m;

    let risk = "LOW";
    let cls = "low";
    let color = "green";

    let targetDir = getDirection(lat, lon, target[0], target[1]);

    let windTo = (dir + 180) % 360;

    let diff = Math.abs(windTo - targetDir);
    if (diff > 180) diff = 360 - diff;

    // 🔍 DEBUG
    console.log("DIR:", dir);
    console.log("WIND TO:", windTo);
    console.log("TARGET:", targetDir);
    console.log("DIFF:", diff);

    if (diff < 30 && speed > 5 && !localStorage.getItem(name)) {
        localStorage.setItem(name, "sent");

        risk = "HIGH";
        cls = "high";
        color = "red";

        let img = new Image();
        img.src = `https://api.telegram.org/botTWÓJ_TOKEN/sendMessage?chat_id=TWÓJ_CHAT_ID&text=🚨 ALERT ${name}`;
    } 
    else if (diff < 60 && speed > 3) {
        risk = "MEDIUM";
        cls = "medium";
        color = "orange";
    }

    document.getElementById(el).className = "card " + cls;
    document.getElementById(el).innerHTML = `
        <b>${name}</b><br>
        Kierunek: ${dir}°<br>
        Wiatr: ${speed} km/h<br>
        <b>${risk}</b>
    `;

    drawLine([lat, lon], dir, speed, color);
}

// start
check(53.6694, 23.8131, "grodno", "Grodno → Białystok", bialystok);
check(52.0976, 23.7341, "brzesc", "Brześć → Lublin", lublin);

setInterval(() => location.reload(), 600000);
</script>
</html>
