<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JETFLOW OPS AI FINAL STABLE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:-apple-system;}
.header{text-align:center;padding:10px;background:#111;font-weight:bold;}
#time{text-align:center;font-size:12px;opacity:0.7;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px;}

.tile{
padding:10px;border-radius:12px;text-align:center;
font-size:12px;cursor:pointer;
background:#f1c40f;
}

#report{
margin:6px;padding:12px;border-radius:12px;background:#1c1f2b;
}

#map{height:260px;margin:6px;border-radius:12px;}

#livePanel{
position:fixed;top:60px;right:5px;width:240px;
max-height:60%;overflow:auto;background:#111;
padding:10px;border-radius:10px;font-size:11px;
}

#loginScreen{
position:fixed;width:100%;height:100%;
background:#0b0f1a;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>🔒 Dostęp</h2>
<input id="login"><br><br>
<input id="pass" type="password"><br><br>
<button onclick="checkLogin()">Zaloguj</button>
</div>

<div class="header">🛰 JETFLOW OPS AI FINAL</div>
<div id="time"></div>

<div id="grid" class="grid"></div>
<div id="report"></div>

<div id="map"></div>
<div id="livePanel">LIVE</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// LOGIN
const LOGIN="PsgBobrowniki";
const PASSWORD="!Bobrowniki1";

function checkLogin(){
if(login.value===LOGIN && pass.value===PASSWORD){
loginScreen.style.display="none";
localStorage.setItem("auth","ok");
}}
if(localStorage.getItem("auth")==="ok"){
loginScreen.style.display="none";
}

// MAP
let map=L.map('map').setView([53.2,23.2],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line;

// ROUTES
const routes=[
{name:"Baranowicze → Białystok",lat:53.13,lon:26.02},
{name:"Baranowicze → Sokółka",lat:53.13,lon:26.02},
{name:"Grodno → Sokółka",lat:53.67,lon:23.83}
];

// TIME
setInterval(()=>time.innerText=new Date().toLocaleString("pl-PL"),1000);

// DATE
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND
async function getWind(lat,lon){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=winddirection_850hPa`);
let d=await r.json();
let h=new Date().getHours();
return d.hourly.winddirection_850hPa[h];
}

// TRAJECTORY
async function simulate(route){

let pts=[];
let lat=route.lat;
let lon=route.lon;

pts.push([lat,lon]);

for(let i=0;i<12;i++){

let dir=(await getWind(lat,lon)+180)%360;

let dLat=(15*Math.cos(dir*Math.PI/180))/111;
let dLon=(15*Math.sin(dir*Math.PI/180))/(111*Math.cos(lat*Math.PI/180));

lat+=dLat;
lon+=dLon;

pts.push([lat,lon]);
}

return pts;
}

// CLICK
async function handleClick(route){
if(line) map.removeLayer(line);

let pts=await simulate(route);
line=L.polyline(pts,{color:"red"}).addTo(map);
map.fitBounds(line.getBounds());
}

// TILES
function buildTiles(){
grid.innerHTML="";

for(let i=0;i<5;i++){
routes.forEach(r=>{
let t=document.createElement("div");
t.className="tile";

t.innerHTML=`
<b>${r.name}</b><br>
📅 ${getDate(i)}<br>
🌐 850hPa
`;

t.onclick=()=>handleClick(r);

grid.appendChild(t);
});
}
}

// LIVE
let liveMarkers={}, liveTracks={}, lastSeen={};

function predict(lat,lon,angle){
let dist=10;
let dLat=(dist*Math.cos(angle*Math.PI/180))/111;
let dLon=(dist*Math.sin(angle*Math.PI/180))/(111*Math.cos(lat*Math.PI/180));
return [lat+dLat,lon+dLon];
}

async function loadLive(){

let res=await fetch("https://api.v2.sondehub.org/amateur/telemetry");
let data=await res.json();

livePanel.innerHTML="<b>LIVE</b><br>";

for(const obj of Object.values(data)){

let id=obj.payload_callsign||Math.random();
let lat=obj.lat;
let lon=obj.lon;
let alt=obj.alt;

if(!lat||!lon||alt<100) continue;
if(lat<52||lat>55||lon<21||lon>26) continue;

if(!liveMarkers[id]){
liveMarkers[id]=L.circleMarker([lat,lon],{radius:6}).addTo(map);
liveTracks[id]=[];
}

liveMarkers[id].setLatLng([lat,lon]);

liveTracks[id].push([lat,lon]);
if(liveTracks[id].length>5) liveTracks[id].shift();

lastSeen[id]=Date.now();

// speed
let speed=0;
if(liveTracks[id].length>1){
let a=liveTracks[id][0];
let b=liveTracks[id][liveTracks[id].length-1];
let dist=Math.sqrt((b[0]-a[0])**2+(b[1]-a[1])**2)*111;
speed=dist*6;
}

// direction
let angle=0;
if(liveTracks[id].length>1){
let a=liveTracks[id][0];
let b=liveTracks[id][liveTracks[id].length-1];
angle=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
if(angle<0) angle+=360;
}

// prediction
let p=predict(lat,lon,angle);
L.polyline([[lat,lon],p],{color:"white",dashArray:"4"}).addTo(map);

// score
let score=0;
if(alt>8000) score+=40;
if(speed>20) score+=30;

let color="cyan";
if(score>60) color="red";
else if(score>30) color="yellow";

liveMarkers[id].setStyle({color});

// panel
livePanel.innerHTML+=`
<div>
Alt:${Math.round(alt)}m<br>
Spd:${speed.toFixed(1)}km/h<br>
Score:${score}
</div><hr>
`;

}

// cleanup
Object.keys(lastSeen).forEach(id=>{
if(Date.now()-lastSeen[id]>60000){
map.removeLayer(liveMarkers[id]);
delete liveMarkers[id];
delete liveTracks[id];
delete lastSeen[id];
}
});
}

// DASHBOARD
function updateReport(){
report.innerHTML=`
🧠 RAPORT OPERACYJNY<br><br>
System: AKTYWNY<br>
LIVE: DZIAŁA<br>
Trajektoria: OK<br>
`;
}

// INIT
function init(){
buildTiles();
updateReport();
loadLive();
}

setInterval(init,20000);
init();

</script>

</body>
</html>
