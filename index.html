<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}
.header{text-align:center;padding:8px;font-size:16px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px;}
.tile{padding:7px;border-radius:10px;text-align:center;font-size:10px;}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{margin:6px;padding:10px;border-radius:10px;background:#1c1f2b;font-size:12px;}

.maps{display:flex;gap:6px;padding:6px;}
#map{height:200px;flex:1;border-radius:10px;}
iframe{flex:1;height:200px;border:none;border-radius:10px;}

#alert{
position:fixed;
bottom:40px;
left:10px;
right:10px;
background:red;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
font-weight:bold;
}

#signature{
position:fixed;
bottom:5px;
right:10px;
font-size:11px;
opacity:0.4;
}

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0f1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>🔒 Dostęp chroniony</h2>
<input id="login" placeholder="Login">
<input id="pass" type="password" placeholder="Hasło">
<button onclick="checkLogin()">Zaloguj</button>
<p id="error"></p>
</div>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>
<div class="grid" id="grid"></div>
<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 TRAFIA W CEL</div>
<div id="signature">JETFLOW OPS AI • by weatherxxx</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// BLOKADA
document.addEventListener('contextmenu', e => e.preventDefault());

// LOGIN
const LOGIN="PsgBobrowniki";
const PASSWORD="!Bobrowniki1";

function checkLogin(){
if(login.value===LOGIN && pass.value===PASSWORD){
loginScreen.style.display="none";
localStorage.setItem("auth","ok");
}else error.innerText="Błąd";
}
if(localStorage.getItem("auth")==="ok"){
loginScreen.style.display="none";
}

// MAPA
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line,zone;

const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50}}
];

// CZAS
setInterval(()=>time.innerText=new Date().toLocaleString("pl-PL"),1000);

function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIATR WARSTWY
async function getWind(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();

let w850={speed:d.hourly.windspeed_850hPa[h],dir:d.hourly.winddirection_850hPa[h]};
let w700={speed:d.hourly.windspeed_700hPa[h],dir:d.hourly.winddirection_700hPa[h]};

let diff=Math.abs(w850.dir-w700.dir);
if(diff>180) diff=360-diff;

let layer="850";
if(w700.speed>w850.speed && diff<40) layer="700";

let unstable=diff>60;
let final=layer==="700"?w700:w850;

return {speed:final.speed,dir:final.dir,layer,unstable};
}

// KIERUNEK
function dirScore(wind,route){
let target=Math.atan2(route.end.lon-route.start.lon,route.end.lat-route.start.lat)*(180/Math.PI);
if(target<0) target+=360;
let diff=Math.abs(wind-target);
if(diff>180) diff=360-diff;

if(diff<20)return{txt:"TRAFIA",score:1};
if(diff<50)return{txt:"ODCHYŁKA",score:0.6};
return{txt:"PRZECIWNIE",score:0};
}

// SCORE
function score(speed,dir,unstable){
let s=0;
if(speed>25)s+=50;
else if(speed>18)s+=40;
else if(speed>14)s+=30;
else if(speed>10)s+=20;
else if(speed>7)s+=10;

s+=dir*50;
if(unstable)s-=15;

return Math.max(0,Math.round(s));
}

// TRAJEKTORIA
async function simulate(route){
let pts=[];
let pos={...route.start};

for(let h=0;h<12;h++){
let w=await getWind(pos.lat,pos.lon,h);

let move=w.speed*0.35;
pos.lat+=move*Math.cos(w.dir*Math.PI/180)/100;
pos.lon+=move*Math.sin(w.dir*Math.PI/180)/100;

pts.push([pos.lat,pos.lon]);
}
return pts;
}

// CLICK
async function handleClick(route,sc,dir){

if(line) map.removeLayer(line);
if(zone) map.removeLayer(zone);

let pts=await simulate(route);

line=L.polyline(pts,{color:"red"}).addTo(map);

let last=pts[pts.length-1];

zone=L.circle(last,{radius:30000,color:"red",fillOpacity:0.2}).addTo(map);

map.fitBounds(line.getBounds());

let dist=Math.sqrt(
Math.pow(last[0]-route.end.lat,2)+
Math.pow(last[1]-route.end.lon,2)
)*111;

if(dist<30 && sc>65 && dir==="TRAFIA"){
alert.style.display="block";
setTimeout(()=>alert.style.display="none",4000);
}
}

// TREND
async function getTrend(){
let w1=await getWind(53.13,26.02,0);
let w2=await getWind(53.13,26.02,3);

if(w2.speed>w1.speed) return "📈 ROŚNIE";
if(w2.speed<w1.speed) return "📉 SPADA";
return "➡ STABILNY";
}

// PROGNOZA
async function predict(){
let good=0;
for(let i=0;i<6;i++){
let w=await getWind(53.13,26.02,i);
if(w.speed>15) good++;
}
if(good>=4)return"🚀 WYSOKIE";
if(good>=2)return"⚠ MOŻLIWE";
return"❌ BRAK";
}

// TILES
async function buildTiles(){
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);
let d=dirScore(w.dir,r);
let sc=score(w.speed,d.score,w.unstable);

let color="low";
if(sc>70)color="veryhigh";
else if(sc>50)color="high";
else if(sc>25)color="medium";

let tile=document.createElement("div");
tile.className="tile "+color;

tile.innerHTML=`
<b>${r.name}</b><br>
${getDate(i)}<br>
💨 ${w.speed.toFixed(1)} km/h<br>
${d.txt}<br>
🌐 ${w.layer}hPa ${w.unstable?"⚠":""}<br>
📊 ${sc}%
`;

tile.onclick=()=>handleClick(r,sc,d.txt);

grid.appendChild(tile);
}
}
}

// RAPORT
async function updateReport(){
let w=await getWind(53.13,26.02,0);
let d=dirScore(w.dir,routes[0]);
let sc=score(w.speed,d.score,w.unstable);
let trend=await getTrend();
let p=await predict();

report.innerHTML=`
<b>🧠 RAPORT OPERACYJNY</b><br><br>
Status: ${sc>60?"SPRZYJAJĄCE":"NIE"}<br>
Wiatr: ${w.speed.toFixed(1)} km/h<br>
Kierunek: ${d.txt}<br>
Warstwa: ${w.layer}hPa ${w.unstable?"(niestabilna)":""}<br>
Trend: ${trend}<br>
Prognoza: ${p}<br>
Okno: ${(new Date().getHours()>=17||new Date().getHours()<=7)?"AKTYWNE 🌙":"NISKIE ☀️"}
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

setInterval(loadAll,300000);
loadAll();

</script>

</body>
</html>
