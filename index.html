<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}

.header{text-align:center;padding:8px;font-size:16px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
padding:5px;
}

.tile{
padding:7px;
border-radius:10px;
text-align:center;
font-size:10.5px;
}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{
margin:6px;
padding:10px;
border-radius:10px;
background:#1c1f2b;
font-size:12px;
}

.maps{
display:flex;
gap:6px;
padding:6px;
}

#map{height:200px;flex:1;border-radius:10px;}
iframe{flex:1;height:200px;border:none;border-radius:10px;}

#alert{
position:fixed;
bottom:40px;
left:10px;
right:10px;
background:red;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
font-weight:bold;
}

#signature{
position:fixed;
bottom:5px;
right:10px;
font-size:11px;
opacity:0.4;
}

/* LOGIN */
#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b0f1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>🔒 Dostęp chroniony</h2>
<input id="login" placeholder="Login" style="padding:10px;margin:5px;border-radius:8px;border:none;text-align:center;">
<input id="pass" type="password" placeholder="Hasło" style="padding:10px;margin:5px;border-radius:8px;border:none;text-align:center;">
<button onclick="checkLogin()" style="padding:10px 20px;border:none;border-radius:8px;background:#ff2ea6;color:white;">Zaloguj</button>
<p id="error" style="color:red;"></p>
</div>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>

<div class="grid" id="grid"></div>
<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 TRAFIA W CEL</div>
<div id="signature">JETFLOW OPS AI • by weatherxxx</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔒 BLOKADA
document.addEventListener('contextmenu', e => e.preventDefault());

// LOGIN
const LOGIN = "PsgBobrowniki";
const PASSWORD = "!Bobrowniki1";

function checkLogin(){
let l=document.getElementById("login").value;
let p=document.getElementById("pass").value;

if(l===LOGIN && p===PASSWORD){
document.getElementById("loginScreen").style.display="none";
localStorage.setItem("auth","ok");
}else{
document.getElementById("error").innerText="Błędne dane";
}
}

if(localStorage.getItem("auth")==="ok"){
document.getElementById("loginScreen").style.display="none";
}

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line=null, zone=null;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16} },
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50} },
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50} }
];

// TIME
setInterval(()=>{
let n=new Date();
document.getElementById("time").innerText=n.toLocaleString("pl-PL");
},1000);

function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND
async function getWind(lat,lon,h){
try{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();
return{
speed:(d.hourly.windspeed_850hPa[h]+d.hourly.windspeed_700hPa[h])/2,
dir:(d.hourly.winddirection_850hPa[h]+d.hourly.winddirection_700hPa[h])/2
};
}catch{return{speed:10,dir:180};}
}

// DIR
function dirStatus(windDir,route){
let target=Math.atan2(route.end.lon-route.start.lon,route.end.lat-route.start.lat)*(180/Math.PI);
if(target<0) target+=360;
let diff=Math.abs(windDir-target);
if(diff>180) diff=360-diff;

if(diff<25) return "🎯";
if(diff<60) return "⚠";
return "⛔";
}

// SCORE
function score(speed,dir){
let s=0;
if(speed>25)s+=50;
else if(speed>18)s+=35;
else if(speed>10)s+=20;
if(dir==="🎯")s+=50;
if(dir==="⚠")s+=25;
return s;
}

// TRAJECTORY
async function simulate(route){
let pts=[],pos={...route.start};
for(let h=0;h<10;h++){
let w=await getWind(pos.lat,pos.lon,h);
pos.lat+=w.speed*0.003*Math.cos(w.dir*Math.PI/180);
pos.lon+=w.speed*0.003*Math.sin(w.dir*Math.PI/180);
pts.push([pos.lat,pos.lon]);
}
return pts;
}

// ALERT
function alertOn(){
let el=document.getElementById("alert");
el.style.display="block";
setTimeout(()=>el.style.display="none",4000);
}

// TILES
async function buildTiles(){
let grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);
let d=dirStatus(w.dir,r);
let sc=score(w.speed,d);

let tile=document.createElement("div");
tile.className="tile medium";

tile.innerHTML=`
<b>${r.name}</b><br>
${getDate(i)}<br>
💨 ${w.speed.toFixed(0)}<br>
${d} ${sc}%
`;

tile.onclick=async()=>{
let pts=await simulate(r);
line=L.polyline(pts).addTo(map);
};

grid.appendChild(tile);
}
}
}

// AI REPORT
async function updateReport(){
document.getElementById("report").innerHTML=`
<b>🧠 RAPORT</b><br>
System aktywny<br>
Auto aktualizacja: TAK
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

setInterval(loadAll,300000);
loadAll();

</script>

</body>
</html>
