<!DOCTYPE html>
<!-- JETFLOW OPS AI ULTRA -->
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:-apple-system;}
.header{text-align:center;padding:8px;background:#111;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px;}
.tile{padding:8px;border-radius:10px;text-align:center;font-size:11px;cursor:pointer;transition:0.2s;}
.tile:hover{transform:scale(1.05);}
.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}
#map{height:230px;}
</style>
</head>

<body>

<div class="header">🛰 JETFLOW OPS AI ULTRA</div>
<div id="grid" class="grid"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}}
];

// WIND (3 WARSTWY)
async function getWindAll(lat,lon,h){

let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_925hPa,windspeed_850hPa,windspeed_700hPa,winddirection_925hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();

return [
{speed:d.hourly.windspeed_925hPa[h],dir:d.hourly.winddirection_925hPa[h],w:0.5},
{speed:d.hourly.windspeed_850hPa[h],dir:d.hourly.winddirection_850hPa[h],w:0.3},
{speed:d.hourly.windspeed_700hPa[h],dir:d.hourly.winddirection_700hPa[h],w:0.2}
];
}

// 🔥 ULTRA TRAJEKTORIA
async function simulate(route){

let pts=[];
let pos={...route.start};

let lastDir=null;

// 10 min krok
let step=0.166;

for(let t=0;t<12;t+=step){

let h=Math.floor(t);

let winds=await getWindAll(pos.lat,pos.lon,h);

// 🔥 mieszanie warstw
let u=0,v=0;

winds.forEach(w=>{
let dir=(w.dir+180)%360;
u+=Math.cos(dir*Math.PI/180)*w.speed*w.w;
v+=Math.sin(dir*Math.PI/180)*w.speed*w.w;
});

let speed=Math.sqrt(u*u+v*v);
let dir=Math.atan2(v,u)*(180/Math.PI);
if(dir<0) dir+=360;

// 🔥 wygładzanie
if(lastDir!==null){
dir=(dir*0.7 + lastDir*0.3);
}
lastDir=dir;

// km
let dist=speed*step;

// przeliczenie
let dLat=(dist*Math.cos(dir*Math.PI/180))/111;
let dLon=(dist*Math.sin(dir*Math.PI/180))/(111*Math.cos(pos.lat*Math.PI/180));

pos.lat+=dLat;
pos.lon+=dLon;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// CLICK
async function draw(route){

if(line) map.removeLayer(line);

let pts=await simulate(route);

line=L.polyline(pts,{color:"red",weight:3}).addTo(map);

map.fitBounds(line.getBounds());
}

// UI
function build(){

let g=document.getElementById("grid");

routes.forEach(r=>{
let t=document.createElement("div");
t.className="tile medium";
t.innerHTML=`${r.name}<br>Kliknij`;
t.onclick=()=>draw(r);
g.appendChild(t);
});
}

build();

</script>

</body>
</html>
