<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.tile {
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  font-size: 16px;
  transition: 0.3s;
  cursor: pointer;
}

.tile.low { background: #2ecc71; }
.tile.medium { background: #f1c40f; }
.tile.high { background: #e743c3; }

.tile:hover { transform: scale(1.05); }
.tile.active { outline: 3px solid white; }

#map {
  height: 350px;
  margin: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>📡 Monitoring PRO</h1>

<div class="grid">
  <div id="day1" class="tile">Ładowanie...</div>
  <div id="day2" class="tile">Ładowanie...</div>
  <div id="day3" class="tile">Ładowanie...</div>
  <div id="day4" class="tile">Ładowanie...</div>
  <div id="day5" class="tile">Ładowanie...</div>
  <div id="day6" class="tile">Ładowanie...</div>
  <div id="day7" class="tile">Ładowanie...</div>
  <div id="day8" class="tile">Ładowanie...</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, marker, polyline;

const baseLat = 52.3;
const baseLon = 23.5;

async function loadData() {

  const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${baseLat}&longitude=${baseLon}&hourly=windspeed_10m,winddirection_10m`);
  const data = await res.json();

  const wind = data.hourly.windspeed_10m[0];
  const dir = data.hourly.winddirection_10m[0];

  function setTile(id, date, percent, risk) {
    const el = document.getElementById(id);

    let cls = "low";
    if (percent > 80) cls = "high";
    else if (percent > 40) cls = "medium";

    el.className = "tile " + cls;
    el.innerHTML = `
      <b>${date}</b><br>
      ${percent}%<br>
      ${risk}<br>
      🌬️ ${wind} km/h<br>
      🧭 ${dir}°
    `;

    el.onclick = () => {
      document.querySelectorAll(".tile").forEach(t => t.classList.remove("active"));
      el.classList.add("active");

      simulateFlight(baseLat, baseLon, wind, dir);
    };
  }

  setTile("day1", "MAR 17", 10, "Low Risk");
  setTile("day2", "MAR 18", 20, "Low Risk");
  setTile("day3", "MAR 19", 30, "Low Risk");
  setTile("day4", "MAR 24", 40, "Low Risk");
  setTile("day5", "MAR 25", 90, "Very High Risk");
  setTile("day6", "MAR 26", 70, "High Risk");
  setTile("day7", "MAR 31", 60, "Medium Risk");
  setTile("day8", "APR 1", 95, "Very High Risk");

  simulateFlight(baseLat, baseLon, wind, dir);
}

function simulateFlight(lat, lon, wind, dir) {

  if (polyline) map.removeLayer(polyline);
  if (marker) map.removeLayer(marker);

  let points = [];
  let currentLat = lat;
  let currentLon = lon;

  for (let i = 0; i < 20; i++) {
    currentLat += Math.cos(dir * Math.PI/180) * wind * 0.01;
    currentLon += Math.sin(dir * Math.PI/180) * wind * 0.01;
    points.push([currentLat, currentLon]);
  }

  polyline = L.polyline(points, {color: 'red'}).addTo(map);

  let i = 0;
  marker = L.marker(points[0]).addTo(map);

  let interval = setInterval(() => {
    if (i >= points.length) return clearInterval(interval);
    marker.setLatLng(points[i]);
    i++;
  }, 300);

  map.fitBounds(polyline.getBounds());
}

document.addEventListener("DOMContentLoaded", () => {

  map = L.map('map').setView([baseLat, baseLon], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  loadData();

  // auto refresh co 60s
  setInterval(loadData, 60000);
});
</script>

</body>
</html>
