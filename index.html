<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;}
h1{text-align:center;padding:20px;}
#update{text-align:center;font-size:12px;opacity:0.7;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px;}

.tile{padding:20px;border-radius:16px;text-align:center;cursor:pointer;transition:0.3s;}
.tile:hover{transform:scale(1.05);}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

.tile.active{outline:3px solid white;}

.wrapper{display:flex;gap:10px;padding:20px;}
#map{height:250px;flex:1;}

.legend{position:absolute;top:20px;right:20px;font-size:12px;opacity:0.8;text-align:right;}
</style>

</head>
<body>

<h1>🛰 Monitoring PRO</h1>
<div id="update"></div>

<div class="legend">
N (0°)<br>E (90°)<br>S (180°)<br>W (270°)
</div>

<div class="grid">
<div id="day1" class="tile">...</div>
<div id="day2" class="tile">...</div>
<div id="day3" class="tile">...</div>
<div id="day4" class="tile">...</div>
<div id="day5" class="tile">...</div>
<div id="day6" class="tile">...</div>
<div id="day7" class="tile">...</div>
<div id="day8" class="tile">...</div>
</div>

<div class="wrapper">
<div id="map"></div>

<iframe 
width="50%" 
height="250"
src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind&metricWind=km%2Fh"
frameborder="0">
</iframe>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 📍 lokalizacje + cele
const locations=[
{ name:"Baranowicze → Białystok", lat:53.13, lon:26.02, targetLat:53.13, targetLon:23.16 },
{ name:"Baranowicze → Sokółka", lat:53.13, lon:26.02, targetLat:53.41, targetLon:23.50 }
];

// 🗺 mapa
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let windLayer;

// 📅 data
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// 🎯 azymut celu
function getBearing(lat1,lon1,lat2,lon2){
let y=Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
let x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// 📊 ryzyko (z kierunkiem)
function calcRisk(speed,dir,targetDir){

let diff=Math.abs(dir-targetDir);
if(diff>180) diff=360-diff;

// 🔥 KLUCZ
if(diff>120) return "low";       // leci w przeciwną
if(diff>60) return "medium";    // bok
if(speed>20) return "veryhigh";
if(speed>14) return "high";
return "medium";
}

// 📈 wysokość (symulacja 1500–3500)
function convert(speed){
return speed*(1.8+Math.random()*0.5)*1.2;
}

// 🌐 API SAFE
async function getWind(lat,lon){
try{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m,time`);
if(!r.ok) throw "err";
return await r.json();
}catch{
return{
hourly:{
time:["x"],
windspeed_10m:[6+Math.random()*8],
winddirection_10m:[Math.random()*360]
}};
}
}

// 🧠 kafel
async function setTile(id,i,loc){

let el=document.getElementById(id);

let data=await getWind(loc.lat,loc.lon);

let speeds=[],dirs=[];

data.hourly.time.forEach((t,idx)=>{

let h=new Date().getHours();

if(h>=17 || h<=7){

let s=data.hourly.windspeed_10m[idx];
let d=data.hourly.winddirection_10m[idx];

if(s){speeds.push(s);dirs.push(d);}
}

});

if(speeds.length===0){
speeds=[6+Math.random()*6];
dirs=[Math.random()*360];
}

let base=speeds.reduce((a,b)=>a+b,0)/speeds.length;
let dir=dirs.reduce((a,b)=>a+b,0)/dirs.length;

let speed=convert(base);

// 🎯 kierunek do celu
let targetDir=getBearing(loc.lat,loc.lon,loc.targetLat,loc.targetLon);

// 🔥 ryzyko z kierunkiem
let cls=calcRisk(speed,dir,targetDir);

el.className="tile "+cls;

el.innerHTML=`
<b>${getDate(i)}</b><br>
${Math.round(speed*3)}%<br>
${cls.toUpperCase()}<br>
${loc.name}<br>
💨 ${speed.toFixed(1)} km/h<br>
🧭 ${Math.round(dir)}° → 🎯 ${Math.round(targetDir)}°
`;

el.onclick=()=>{
document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

map.setView([loc.lat,loc.lon],7);
drawWind(loc.lat,loc.lon,speed,dir);
};

}

// 🌬 trajektoria
function drawWind(lat,lon,speed,dir){

if(windLayer)map.removeLayer(windLayer);

let pts=[],x=lat,y=lon;

for(let i=0;i<50;i++){
x+=Math.cos(dir*Math.PI/180)*0.1;
y+=Math.sin(dir*Math.PI/180)*0.1;
pts.push([x,y]);
}

windLayer=L.polyline(pts,{color:'cyan'}).addTo(map);
}

// ⏱ aktualizacja
document.getElementById("update").innerText="Ostatnia aktualizacja: "+new Date().toLocaleTimeString();

// 🚀 start
for(let i=0;i<8;i++){
let loc=i<4?locations[0]:locations[1];
setTile("day"+(i+1),i,loc);
}

</script>

</body>
</html>
