<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Monitoring PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }
h1 { text-align:center; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.tile {
  padding:18px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
  cursor:pointer;
}

.tile.low { background:#2ecc71; }
.tile.medium { background:#f1c40f; }
.tile.high { background:#e74c3c; }
.tile.veryhigh { background:#ff00aa; }

.tile:hover { transform:scale(1.05); }

.map { height:300px; margin:20px; }
</style>
</head>

<body>

<h1>🛰️ Monitoring PRO</h1>

<div class="grid">
  <div id="day1" class="tile">Ładowanie...</div>
  <div id="day2" class="tile">Ładowanie...</div>
  <div id="day3" class="tile">Ładowanie...</div>
  <div id="day4" class="tile">Ładowanie...</div>
  <div id="day5" class="tile">Ładowanie...</div>
  <div id="day6" class="tile">Ładowanie...</div>
  <div id="day7" class="tile">Ładowanie...</div>
  <div id="day8" class="tile">Ładowanie...</div>
</div>

<div id="map" class="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 📍 lokalizacje
const locations = [
  { name: "Grodno–Białystok", lat:53.13, lon:23.16 },
  { name: "Michałowo–Bobrowniki", lat:53.30, lon:23.65 }
];

// 🗺️ mapa
let map = L.map('map').setView([53.2, 23.3], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 📅 daty
function getDate(i){
  const d = new Date();
  d.setDate(d.getDate()+i);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase();
}

// 🎯 ryzyko na podstawie wiatru
function calcRisk(speed){
  if(speed > 20) return {cls:"veryhigh", txt:"VERY HIGH RISK", val:90+Math.random()*10};
  if(speed > 14) return {cls:"high", txt:"HIGH RISK", val:70+Math.random()*10};
  if(speed > 8) return {cls:"medium", txt:"MEDIUM RISK", val:40+Math.random()*10};
  return {cls:"low", txt:"LOW RISK", val:10+Math.random()*20};
}

// 🌬️ pobieranie wiatru (Open-Meteo – wysokości)
async function getWind(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,winddirection_850hPa,windspeed_700hPa,winddirection_700hPa&forecast_days=1`;

  const res = await fetch(url);
  const data = await res.json();

  // średnia z 850 + 700 hPa
  const s1 = data.hourly.windspeed_850hPa[0];
  const s2 = data.hourly.windspeed_700hPa[0];
  const d1 = data.hourly.winddirection_850hPa[0];
  const d2 = data.hourly.winddirection_700hPa[0];

  return {
    speed: ((s1 + s2)/2).toFixed(1),
    dir: Math.round((d1 + d2)/2)
  };
}

// 🧱 ustaw kafelki
async function setTile(id, i, location){
  const el = document.getElementById(id);

  const wind = await getWind(location.lat, location.lon);
  const risk = calcRisk(wind.speed);

  el.className = "tile "+risk.cls;
  el.innerHTML = `
    <b>${getDate(i)}</b><br>
    ${Math.round(risk.val)}%<br>
    ${risk.txt}<br><br>
    📍 ${location.name}<br>
    🌬️ ${wind.speed} km/h<br>
    🧭 ${wind.dir}°
  `;

  el.onclick = ()=>{
    map.setView([location.lat, location.lon],10);
    L.marker([location.lat, location.lon]).addTo(map);
  }
}

// 🚀 generowanie
async function init(){

  // pierwsze 4 dni – lokalizacja 1
  for(let i=0;i<4;i++){
    await setTile("day"+(i+1), i, locations[0]);
  }

  // kolejne 4 dni – lokalizacja 2
  for(let i=4;i<8;i++){
    await setTile("day"+(i+1), i, locations[1]);
  }

}

init();

</script>

</body>
</html>
