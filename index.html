<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}

.header{text-align:center;padding:8px;font-size:16px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;margin-bottom:5px;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
padding:5px;
}

.tile{
padding:7px;
border-radius:10px;
text-align:center;
font-size:10.5px;
line-height:1.25;
transition:0.2s;
}
.tile:hover{transform:scale(1.04);}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{
margin:6px;
padding:10px;
border-radius:10px;
background:#1c1f2b;
font-size:12px;
}

.maps{
display:flex;
gap:6px;
padding:6px;
}

#map{height:200px;flex:1;border-radius:10px;}
iframe{flex:1;height:200px;border:none;border-radius:10px;}

#alert{
position:fixed;
bottom:40px;
left:10px;
right:10px;
background:red;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
font-weight:bold;
}

/* PODPIS */
#signature{
position:fixed;
bottom:5px;
right:10px;
font-size:11px;
opacity:0.4;
}
</style>
</head>

<body>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>

<div class="grid" id="grid"></div>

<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 TRAFIA W CEL</div>

<div id="signature">JETFLOW OPS AI • by weatherxxx</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔒 BLOKADA KOPIOWANIA
document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = function(e){
if(e.keyCode==123) return false;
if(e.ctrlKey && e.key=='u') return false;
};

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line=null, zone=null;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16} },
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50} },
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50} }
];

// TIME
function updateTime(){
let n=new Date();
document.getElementById("time").innerText=
n.toLocaleDateString("pl-PL")+" | "+n.toLocaleTimeString("pl-PL");
}
setInterval(updateTime,1000);
updateTime();

function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND
async function getWind(lat,lon,h){
try{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();
if(d.hourly && d.hourly.windspeed_850hPa[h]){
return{
speed:(d.hourly.windspeed_850hPa[h]+d.hourly.windspeed_700hPa[h])/2,
dir:(d.hourly.winddirection_850hPa[h]+d.hourly.winddirection_700hPa[h])/2,
src:"REAL"
};
}
}catch{}
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m`);
let d=await r.json();
return{
speed:d.hourly.windspeed_10m[h]*2,
dir:d.hourly.winddirection_10m[h],
src:"FALLBACK"
};
}

// DIR
function dirStatus(windDir,route){
let target=Math.atan2(route.end.lon-route.start.lon,route.end.lat-route.start.lat)*(180/Math.PI);
if(target<0) target+=360;
let diff=Math.abs(windDir-target);
if(diff>180) diff=360-diff;

if(diff<25) return "🎯 TRAFIA";
if(diff<60) return "⚠ ODCHYŁKA";
return "⛔ PRZECIWNIE";
}

// SCORE
function score(speed,dir){
let s=0;
if(speed>25) s+=50;
else if(speed>18) s+=35;
else if(speed>10) s+=20;

if(dir.includes("TRAFIA")) s+=50;
if(dir.includes("ODCHYŁKA")) s+=25;

return Math.min(s,100);
}

// AI
async function aiPrediction(){
let total=0,count=0;

for(let h=17;h<=23;h++){
let w=await getWind(53.13,26.02,h);
total+=w.speed; count++;
}
for(let h=0;h<=7;h++){
let w=await getWind(53.13,26.02,h);
total+=w.speed; count++;
}

let avg=total/count;

if(avg>22) return {txt:"🚀 WYSOKIE",score:90};
if(avg>16) return {txt:"⚠ MOŻLIWE",score:60};
return {txt:"❌ BRAK",score:20};
}

// TRAJECTORY
async function simulate(route){
let pts=[];
let pos={...route.start};

for(let h=0;h<12;h++){
let w=await getWind(pos.lat,pos.lon,h);
let move=w.speed*0.3;
pos.lat+=move*Math.cos(w.dir*Math.PI/180)/100;
pos.lon+=move*Math.sin(w.dir*Math.PI/180)/100;
pts.push([pos.lat,pos.lon]);
}
return pts;
}

// ALERT
function alertOn(){
let el=document.getElementById("alert");
el.style.display="block";
setTimeout(()=>el.style.display="none",4000);
}

// TILES
async function buildTiles(){
let grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);
let d=dirStatus(w.dir,r);
let sc=score(w.speed,d);

let color="low";
if(sc>75) color="veryhigh";
else if(sc>50) color="high";
else if(sc>25) color="medium";

let tile=document.createElement("div");
tile.className="tile "+color;

tile.innerHTML=`
<b>${r.name}</b><br>
${getDate(i)}<br>
💨 ${w.speed.toFixed(0)} km/h<br>
${d}<br>
📊 ${sc}%
`;

tile.onclick=async()=>{
if(line) map.removeLayer(line);
if(zone) map.removeLayer(zone);

let pts=await simulate(r);

line=L.polyline(pts,{color:"red"}).addTo(map);

let last=pts[pts.length-1];

zone=L.circle(last,{radius:30000,color:"red",fillOpacity:0.25}).addTo(map);

map.fitBounds(line.getBounds());

let dist=Math.sqrt(
Math.pow(last[0]-r.end.lat,2)+
Math.pow(last[1]-r.end.lon,2)
)*111;

if(dist<30) alertOn();
};

grid.appendChild(tile);
}
}
}

// REPORT
async function updateReport(){
let pred=await aiPrediction();
let w=await getWind(53.13,26.02,0);

document.getElementById("report").innerHTML=`
<b>🧠 RAPORT OPERACYJNY</b><br><br>
Start dziś: ${pred.txt}<br>
AI Score: ${pred.score}%<br>
Wiatr: ${w.speed.toFixed(1)} km/h<br>
Źródło: ${w.src}
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

setInterval(loadAll,300000);
loadAll();

</script>

</body>
</html>
