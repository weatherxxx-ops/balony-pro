.grid {

  gap:15px;

}

.tile {
  padding:18px;
  border-radius:16px;

.tile.medium { background:#f1c40f; }
.tile.high { background:#e74c3c; }
.tile.veryhigh { background:#ff00aa; }

.tile:hover { transform:scale(1.05); }

.map { height:350px; margin:20px; }
