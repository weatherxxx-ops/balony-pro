<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JETFLOW OPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
color:white;

/* 🔥 TŁO BALON */
background:
linear-gradient(rgba(11,15,26,0.9), rgba(11,15,26,0.95)),
url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde');

background-size:cover;
background-position:center;
}

h1{
text-align:center;
padding:20px;
font-size:28px;
letter-spacing:2px;
}

#update{
text-align:center;
font-size:12px;
opacity:0.7;
margin-top:-10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.tile{
padding:20px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.3s;
backdrop-filter:blur(4px);
}

.tile:hover{
transform:scale(1.05);
}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

.tile.active{
outline:3px solid white;
}

.wrapper{
display:flex;
gap:10px;
padding:20px;
}

#map{
height:260px;
flex:1;
}

.arrow{
font-size:22px;
}

.result{
font-weight:bold;
margin-top:5px;
}

.legend{
position:absolute;
top:20px;
right:20px;
font-size:12px;
opacity:0.8;
text-align:right;
}
</style>

</head>
<body>

<h1>🛰 JETFLOW OPS</h1>
<div id="update"></div>

<div class="legend">
↑ N<br>→ E<br>↓ S<br>← W
</div>

<div class="grid">
<div id="day1" class="tile"></div>
<div id="day2" class="tile"></div>
<div id="day3" class="tile"></div>
<div id="day4" class="tile"></div>
<div id="day5" class="tile"></div>
<div id="day6" class="tile"></div>
<div id="day7" class="tile"></div>
<div id="day8" class="tile"></div>
</div>

<div class="wrapper">
<div id="map"></div>

<iframe width="50%" height="260"
src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind&metricWind=km%2Fh"
frameborder="0"></iframe>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const locations=[
{ name:"Baranowicze → Białystok", lat:53.13, lon:26.02, targetLat:53.13, targetLon:23.16 },
{ name:"Baranowicze → Sokółka", lat:53.13, lon:26.02, targetLat:53.41, targetLon:23.50 }
];

let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let windLayer,impactMarker;

function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

function getArrow(deg){
if(deg<45 || deg>=315) return "↑";
if(deg<135) return "→";
if(deg<225) return "↓";
return "←";
}

function getBearing(lat1,lon1,lat2,lon2){
let y=Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
let x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

function interpret(dir,target){
let diff=Math.abs(dir-target);
if(diff>180) diff=360-diff;

if(diff<30) return "TRAFIA 🎯";
if(diff<60) return "BLISKO ⚠️";
if(diff<120) return "ODCHYŁKA ❌";
return "PRZECIWNIE ⛔";
}

function calcRisk(speed,dir,target){
let diff=Math.abs(dir-target);
if(diff>180) diff=360-diff;

if(diff>120) return "low";
if(diff>60) return "medium";
if(speed>20) return "veryhigh";
if(speed>14) return "high";
return "medium";
}

function convert(s){
return s*(1.8+Math.random()*0.5)*1.2;
}

async function getWind(lat,lon){
try{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m,time`);
if(!r.ok) throw "err";
return await r.json();
}catch{
return{hourly:{time:["x"],windspeed_10m:[6+Math.random()*6],winddirection_10m:[Math.random()*360]}};
}
}

function simulatePath(lat,lon,dir){
let pts=[],x=lat,y=lon;

for(let i=0;i<60;i++){
x+=Math.cos(dir*Math.PI/180)*0.1;
y+=Math.sin(dir*Math.PI/180)*0.1;
pts.push([x,y]);
}

return pts;
}

function drawWind(lat,lon,dir){

if(windLayer)map.removeLayer(windLayer);
if(impactMarker)map.removeLayer(impactMarker);

let pts=simulatePath(lat,lon,dir);

windLayer=L.polyline(pts,{color:'cyan'}).addTo(map);

let last=pts[pts.length-1];
impactMarker=L.marker(last).addTo(map).bindPopup("Punkt przewidywany");
}

async function setTile(id,i,loc){

let el=document.getElementById(id);
let data=await getWind(loc.lat,loc.lon);

let base=data.hourly.windspeed_10m[0];
let dir=data.hourly.winddirection_10m[0];

let speed=convert(base);

let target=getBearing(loc.lat,loc.lon,loc.targetLat,loc.targetLon);

let cls=calcRisk(speed,dir,target);
let result=interpret(dir,target);

el.className="tile "+cls;

el.innerHTML=`
<b>${getDate(i)}</b><br>
${cls.toUpperCase()}<br>
${loc.name}<br>
💨 ${speed.toFixed(1)} km/h<br><br>
<span class="arrow">${getArrow(dir)} → ${getArrow(target)}</span><br>
<div class="result">${result}</div>
`;

el.onclick=()=>{
document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
drawWind(loc.lat,loc.lon,dir);
};

}

document.getElementById("update").innerText="Ostatnia aktualizacja: "+new Date().toLocaleTimeString();

for(let i=0;i<8;i++){
let loc=i<4?locations[0]:locations[1];
setTile("day"+(i+1),i,loc);
}

</script>

</body>
</html>
