<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:-apple-system;}

.header{text-align:center;padding:8px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:6px;
}

.tile{
padding:10px;
border-radius:12px;
text-align:center;
font-size:12px;
cursor:pointer;
transition:0.2s;
}
.tile:hover{transform:scale(1.05);}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{
margin:6px;
padding:12px;
border-radius:12px;
background:#1c1f2b;
}

.maps{
display:flex;
gap:6px;
padding:6px;
}

#map{
height:220px;
flex:1;
border-radius:12px;
}

iframe{
flex:1;
height:220px;
border:none;
border-radius:12px;
}

#alert{
position:fixed;
bottom:40px;
left:10px;
right:10px;
background:red;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
font-weight:bold;
}

#loginScreen{
position:fixed;
width:100%;
height:100%;
background:#0b0f1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>🔒 Dostęp</h2>
<input id="login" placeholder="Login"><br><br>
<input id="pass" type="password" placeholder="Hasło"><br><br>
<button onclick="checkLogin()">Zaloguj</button>
<p id="error"></p>
</div>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>

<div id="grid" class="grid"></div>
<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 PODEJRZANY OBIEKT</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// LOGIN
const LOGIN="PsgBobrowniki";
const PASSWORD="!Bobrowniki1";

function checkLogin(){
if(login.value===LOGIN && pass.value===PASSWORD){
loginScreen.style.display="none";
localStorage.setItem("auth","ok");
}else error.innerText="Błąd";
}
if(localStorage.getItem("auth")==="ok"){
loginScreen.style.display="none";
}

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50}}
];

// TIME
setInterval(()=>time.innerText=new Date().toLocaleString("pl-PL"),1000);

// WIND
async function getWind(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,winddirection_850hPa`);
let d=await r.json();

return {
speed:d.hourly.windspeed_850hPa[h],
dir:d.hourly.winddirection_850hPa[h]
};
}

// TRAJEKTORIA FIX
async function simulate(route){

let pts=[];
let pos={...route.start};

for(let h=0;h<12;h++){

let w=await getWind(pos.lat,pos.lon,h);

let dir=(w.dir+180)%360;

let dist=w.speed;

let dLat=(dist*Math.cos(dir*Math.PI/180))/111;
let dLon=(dist*Math.sin(dir*Math.PI/180))/(111*Math.cos(pos.lat*Math.PI/180));

pos.lat+=dLat;
pos.lon+=dLon;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// CLICK
async function handleClick(route){
if(line) map.removeLayer(line);
let pts=await simulate(route);
line=L.polyline(pts,{color:"red",weight:3}).addTo(map);
map.fitBounds(line.getBounds());
}

// TILES
function buildTiles(){
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let tile=document.createElement("div");
tile.className="tile medium";

tile.innerHTML=`${r.name}<br>Dzień +${i}`;

tile.onclick=()=>handleClick(r);

grid.appendChild(tile);
}
}
}

// RAPORT
function updateReport(){
report.innerHTML=`
<b>🧠 RAPORT</b><br>
System aktywny<br>
Trajektoria: OK<br>
Kierunek: poprawiony<br>
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

loadAll();

</script>

</body>
</html>
