<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:-apple-system;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px;}
.tile{padding:6px;border-radius:10px;text-align:center;font-size:10px;}
.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}
#map{height:220px;}
</style>
</head>

<body>

<div id="grid"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}}
];

// WIND
async function getWind(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_925hPa,winddirection_925hPa`);
let d=await r.json();

return {
speed:d.hourly.windspeed_925hPa[h],
dir:d.hourly.winddirection_925hPa[h]
};
}

// 🔥 NOWA TRAJEKTORIA (REALNA)
async function simulate(route){

let pts=[];
let pos={...route.start};

// 1h krok
let dt=1;

for(let h=0;h<12;h++){

let w=await getWind(pos.lat,pos.lon,h);

// 🔥 kierunek DO (nie FROM)
let dir=(w.dir+180)%360;

// km/h → km
let dist=w.speed*dt;

// km → stopnie
let dLat=(dist*Math.cos(dir*Math.PI/180))/111;

// 🔥 korekta długości (ważne!)
let dLon=(dist*Math.sin(dir*Math.PI/180))/(111*Math.cos(pos.lat*Math.PI/180));

// update pozycji
pos.lat+=dLat;
pos.lon+=dLon;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// CLICK
async function draw(route){

if(line) map.removeLayer(line);

let pts=await simulate(route);

line=L.polyline(pts,{color:"red",weight:3}).addTo(map);

map.fitBounds(line.getBounds());
}

// TILES
function build(){

let g=document.getElementById("grid");

routes.forEach(r=>{

let t=document.createElement("div");
t.className="tile medium";

t.innerHTML=`<b>${r.name}</b><br>Kliknij`;

t.onclick=()=>draw(r);

g.appendChild(t);

});
}

build();

</script>

</body>
</html>
