<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Monitoring PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

h1 {
  text-align:center;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.tile {
  padding:18px;
  border-radius:16px;
  text-align:center;
  transition:0.3s;
  cursor:pointer;
}

.tile.low { background:#2ecc71; }
.tile.medium { background:#f1c40f; }
.tile.high { background:#e74c3c; }
.tile.veryhigh { background:#ff00aa; }

.tile:hover {
  transform:scale(1.05);
}

.map {
  height:300px;
  margin:20px;
}
</style>
</head>

<body>

<h1>🛰️ Monitoring PRO</h1>

<div class="grid">
  <div id="day1" class="tile">Ładowanie...</div>
  <div id="day2" class="tile">Ładowanie...</div>
  <div id="day3" class="tile">Ładowanie...</div>
  <div id="day4" class="tile">Ładowanie...</div>
  <div id="day5" class="tile">Ładowanie...</div>
  <div id="day6" class="tile">Ładowanie...</div>
  <div id="day7" class="tile">Ładowanie...</div>
  <div id="day8" class="tile">Ładowanie...</div>
</div>

<div id="map" class="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// lokalizacje
const locations = [
  { name: "Grodno–Białystok", lat:53.13, lon:23.16 },
  { name: "Michałowo–Bobrowniki", lat:53.30, lon:23.65 }
];

// mapa
let map = L.map('map').setView([53.2, 23.3], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// data od dziś
function getDate(i){
  const d = new Date();
  d.setDate(d.getDate()+i);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase();
}

// losowy wiatr (symulacja API)
function getWind(){
  return {
    speed:(Math.random()*20).toFixed(1),
    dir:Math.floor(Math.random()*360)
  }
}

// ustaw kafelek
function setTile(id, i, percent, location){
  const el = document.getElementById(id);

  let cls = "low";
  if(percent>80) cls="veryhigh";
  else if(percent>60) cls="high";
  else if(percent>40) cls="medium";

  const wind = getWind();

  el.className = "tile "+cls;
  el.innerHTML = `
    <b>${getDate(i)}</b><br>
    ${percent}%<br>
    ${cls.toUpperCase()} RISK<br><br>
    📍 ${location.name}<br>
    🌬️ ${wind.speed} km/h<br>
    🧭 ${wind.dir}°
  `;

  el.onclick = ()=>{
    map.setView([location.lat, location.lon],10);
    L.marker([location.lat, location.lon]).addTo(map);
  }
}

// dane
setTile("day1",0,10,locations[0]);
setTile("day2",1,20,locations[0]);
setTile("day3",2,30,locations[0]);
setTile("day4",3,40,locations[0]);
setTile("day5",4,90,locations[1]);
setTile("day6",5,70,locations[1]);
setTile("day7",6,60,locations[1]);
setTile("day8",7,95,locations[1]);

</script>

</body>
</html>
