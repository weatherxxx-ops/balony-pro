<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

h1 { text-align:center; padding:10px; }

.update {
  text-align:center;
  font-size:12px;
  opacity:0.7;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  padding:15px;
}

.tile {
  padding:15px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.tile.active {
  transform:scale(1.1);
  outline:3px solid white;
}

.tile.low { background:#2ecc71; }
.tile.medium { background:#f1c40f; }
.tile.high { background:#e67e22; }
.tile.veryhigh { background:#ff00aa; }

.map { height:350px; margin:15px; }

.wind-box {
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:8px;
  border-radius:10px;
  font-size:12px;
  z-index:1000;
}
</style>
</head>

<body>

<h1>🛰️ Monitoring PRO</h1>
<div class="update" id="updateTime">Ładowanie danych...</div>

<div class="grid">
  <div id="day1" class="tile">...</div>
  <div id="day2" class="tile">...</div>
  <div id="day3" class="tile">...</div>
  <div id="day4" class="tile">...</div>
  <div id="day5" class="tile">...</div>
  <div id="day6" class="tile">...</div>
  <div id="day7" class="tile">...</div>
  <div id="day8" class="tile">...</div>
</div>

<div id="map" class="map"></div>

<div class="wind-box">
<b>Kierunki</b><br>
N (0°) ↑<br>
E (90°) →<br>
S (180°) ↓<br>
W (270°) ←
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🔥 lokalizacje
const locations = [
  { name:"Baranowicze → Białystok", lat:53.13, lon:26.01 },
  { name:"Baranowicze → Sokółka", lat:53.13, lon:26.01 }
];

let map = L.map('map').setView([53.2, 25.5], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let windParticles = [];
let animation;

function updateTime(){
  const now = new Date();
  document.getElementById("updateTime").innerText =
    "Ostatnia aktualizacja: " + now.toLocaleTimeString();
}

function clearWind(){
  windParticles.forEach(p=>map.removeLayer(p));
  windParticles=[];
  if(animation) clearInterval(animation);
}

function startWind(lat, lon, speed, dir){
  clearWind();

  for(let i=0;i<40;i++){
    let x = lat + (Math.random()-0.5)*2;
    let y = lon + (Math.random()-0.5)*2;

    const dot = L.circleMarker([x,y], {radius:2,color:"white"}).addTo(map);
    windParticles.push(dot);
  }

  animation = setInterval(()=>{
    windParticles.forEach(p=>{
      let pos = p.getLatLng();

      const move = speed * 0.002;

      let lat2 = pos.lat + Math.cos(dir*Math.PI/180)*move;
      let lon2 = pos.lng + Math.sin(dir*Math.PI/180)*move;

      p.setLatLng([lat2,lon2]);

      if(Math.abs(lat2-lat)>2){
        p.setLatLng([lat+(Math.random()-0.5)*2, lon+(Math.random()-0.5)*2]);
      }
    });
  },100);
}

function getDate(i){
  const d = new Date();
  d.setDate(d.getDate()+i);
  return d.toLocaleDateString("pl-PL");
}

function calcRisk(speed){
  if(speed>20) return "veryhigh";
  if(speed>14) return "high";
  if(speed>8) return "medium";
  return "low";
}

// 🔥 tylko noc (17–7)
function getNightIndexes(times){
  let indexes=[];
  times.forEach((t,i)=>{
    const h = new Date(t).getHours();
    if(h>=17 || h<=7) indexes.push(i);
  });
  return indexes;
}

async function getWind(lat, lon){
  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa,time`
  );
  return await res.json();
}

// 🔥 FIXED kafelki
async function setTile(id,i,loc){

  const el = document.getElementById(id);

  try{

    const data = await getWind(loc.lat, loc.lon);

    if(!data.hourly) throw "Brak danych";

    const idxs = getNightIndexes(data.hourly.time);

    if(idxs.length === 0) throw "Brak godzin";

    let speeds=[], dirs=[];

    idxs.forEach(idx=>{
      const s850 = data.hourly.windspeed_850hPa[idx];
      const s700 = data.hourly.windspeed_700hPa[idx];
      const d850 = data.hourly.winddirection_850hPa[idx];
      const d700 = data.hourly.winddirection_700hPa[idx];

      if(s850 && s700){
        speeds.push((s850+s700)/2);
        dirs.push((d850+d700)/2);
      }
    });

    if(speeds.length === 0) throw "Brak danych";

    const speed = speeds.reduce((a,b)=>a+b,0)/speeds.length;
    const dir = dirs.reduce((a,b)=>a+b,0)/dirs.length;

    const cls = calcRisk(speed);

    el.className = "tile "+cls;

    el.innerHTML = `
      <b>${getDate(i)}</b><br>
      ${Math.round(speed*3)}%<br>
      ${cls.toUpperCase()}<br>
      ${loc.name}<br>
      💨 ${speed.toFixed(1)} km/h<br>
      🧭 ${Math.round(dir)}°
    `;

    el.onclick = ()=>{
      document.querySelectorAll(".tile").forEach(t=>t.classList.remove("active"));
      el.classList.add("active");

      map.setView([loc.lat,loc.lon],7);
      startWind(loc.lat,loc.lon,speed,dir);
    };

  } catch(e){

    el.className="tile medium";
    el.innerHTML=`
      <b>${getDate(i)}</b><br>
      BRAK DANYCH<br>
      ${loc.name}
    `;

    console.error(e);
  }
}

// 🔥 INIT BEZ await (ważne)
function init(){

  updateTime();

  for(let i=0;i<8;i++){
    const loc = i<4 ? locations[0] : locations[1];
    setTile("day"+(i+1),i,loc);
  }
}

// auto refresh
setInterval(init,300000);

init();

</script>

</body>
</html>
