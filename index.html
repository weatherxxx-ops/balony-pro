<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS PRO MAX+</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}
.header{text-align:center;padding:15px;font-size:20px;background:#111;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.tile{
padding:15px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.tile:active{transform:scale(0.95);}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#map{height:340px;margin:10px;border-radius:15px;}

#alert{
position:fixed;
bottom:15px;
left:10px;
right:10px;
background:red;
padding:12px;
border-radius:12px;
text-align:center;
display:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛰 JETFLOW OPS PRO MAX+</div>

<div class="grid">
<div id="t1" class="tile"></div>
<div id="t2" class="tile"></div>
<div id="t3" class="tile"></div>
<div id="t4" class="tile"></div>
<div id="t5" class="tile"></div>
<div id="t6" class="tile"></div>
</div>

<div id="map"></div>
<div id="alert">🚨 STREFA WCHODZI W CEL</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAPA =====
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line=null;
let zone=null;

// ===== TRASY =====
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16} },
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50} },
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50} }
];

// ===== API =====
async function getWind(lat,lon,hour){

try{
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();

if(d.hourly && d.hourly.windspeed_850hPa[hour]){
return{
speed:(d.hourly.windspeed_850hPa[hour]+d.hourly.windspeed_700hPa[hour])/2,
dir:(d.hourly.winddirection_850hPa[hour]+d.hourly.winddirection_700hPa[hour])/2,
src:"REAL"
};
}
}catch{}

// fallback
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m`);
let d=await r.json();

return{
speed:d.hourly.windspeed_10m[hour]*2,
dir:d.hourly.winddirection_10m[hour],
src:"FALLBACK"
};

}

// ===== ODLEGŁOŚĆ =====
function dist(a,b,c,d){
let R=6371;
let dLat=(c-a)*Math.PI/180;
let dLon=(d-b)*Math.PI/180;
let x=Math.sin(dLat/2)**2+
Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
Math.sin(dLon/2)**2;
return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== TRAJEKTORIA CZASOWA =====
async function simulate(route){

let pts=[];
let pos={...route.start};

pts.push([pos.lat,pos.lon]);

for(let h=0;h<12;h++){

let w=await getWind(pos.lat,pos.lon,h);

let move=w.speed*0.3;

pos.lat+=move*Math.cos(w.dir*Math.PI/180)/100;
pos.lon+=move*Math.sin(w.dir*Math.PI/180)/100;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// ===== STREFA SPADKU =====
function drawZone(point){

let radius=30000; // 30 km

return L.circle(point,{
radius:radius,
color:"red",
fillColor:"red",
fillOpacity:0.2
});
}

// ===== KLASY =====
function cls(speed){
if(speed>25) return "veryhigh";
if(speed>18) return "high";
if(speed>10) return "medium";
return "low";
}

// ===== ALERT =====
function alertOn(){
let el=document.getElementById("alert");
el.style.display="block";
setTimeout(()=>el.style.display="none",4000);
}

// ===== TILE =====
async function setTile(id,route,i){

let el=document.getElementById(id);

let w=await getWind(route.start.lat,route.start.lon,i*24);

el.className="tile "+cls(w.speed);

el.innerHTML=`
<b>${route.name}</b><br>
Dzień ${i+1}<br>
💨 ${w.speed.toFixed(1)} km/h<br>
${w.src}
`;

el.onclick=async()=>{

if(line) map.removeLayer(line);
if(zone) map.removeLayer(zone);

let pts=await simulate(route);

line=L.polyline(pts,{color:"red"}).addTo(map);

let last=pts[pts.length-1];

// strefa spadku
zone=drawZone(last).addTo(map);

map.fitBounds(line.getBounds());

// sprawdzenie celu
let d=dist(last[0],last[1],route.end.lat,route.end.lon);

if(d<30) alertOn();

};

}

// ===== START =====
setTile("t1",routes[0],0);
setTile("t2",routes[0],1);
setTile("t3",routes[1],0);
setTile("t4",routes[1],1);
setTile("t5",routes[2],0);
setTile("t6",routes[2],1);

</script>

</body>
</html>
