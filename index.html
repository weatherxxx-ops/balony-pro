<script>

// LOGIN
const LOGIN="PsgBobrowniki";
const PASSWORD="!Bobrowniki1";

function checkLogin(){
if(login.value===LOGIN && pass.value===PASSWORD){
loginScreen.style.display="none";
localStorage.setItem("auth","ok");
}else error.innerText="Błędne dane";
}
if(localStorage.getItem("auth")==="ok"){
loginScreen.style.display="none";
}

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line,startMarker,endMarker,animMarker;

// LIVE
let liveMarkers={}, liveTracks={}, lastSeen={};
let heatCircle=null;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}}
];

// TIME
setInterval(()=>time.innerText=new Date().toLocaleString("pl-PL"),1000);

// DATE
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND (3 WARSTWY)
async function getWindFull(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_925hPa,windspeed_850hPa,windspeed_700hPa,winddirection_925hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();

return {
dir925:d.hourly.winddirection_925hPa[h],
dir850:d.hourly.winddirection_850hPa[h],
dir700:d.hourly.winddirection_700hPa[h],

spd925:d.hourly.windspeed_925hPa[h],
spd850:d.hourly.windspeed_850hPa[h],
spd700:d.hourly.windspeed_700hPa[h]
};
}

// DO KAFELKÓW (zostaje)
async function getWind(lat,lon,h){
let w=await getWindFull(lat,lon,h);
return {speed:(w.spd925+w.spd850+w.spd700)/3,dir:(w.dir925+w.dir850+w.dir700)/3,l:"mix"};
}

// TRAJEKTORIA FIX
async function simulate(route){

let pts=[];
let pos={...route.start};

pts.push([pos.lat,pos.lon]);

for(let h=0;h<12;h++){

let w=await getWindFull(pos.lat,pos.lon,h);

let dir=(w.dir925+w.dir850+w.dir700)/3 + 180;
let speed=(w.spd925+w.spd850+w.spd700)/3;

let dLat=(speed*Math.cos(dir*Math.PI/180))/111;
let dLon=(speed*Math.sin(dir*Math.PI/180))/(111*Math.cos(pos.lat*Math.PI/180));

pos.lat+=dLat;
pos.lon+=dLon;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// HEATMAPA (obszar spadku)
function drawHeat(end){

if(heatCircle) map.removeLayer(heatCircle);

heatCircle=L.circle(end,{
radius:15000,
color:"red",
fillColor:"red",
fillOpacity:0.2
}).addTo(map);
}

// ANIMACJA
function animate(points){

if(animMarker) map.removeLayer(animMarker);

let i=0;
animMarker=L.circleMarker(points[0],{radius:6,color:"yellow"}).addTo(map);

let interval=setInterval(()=>{
i++;
if(i>=points.length) return clearInterval(interval);
animMarker.setLatLng(points[i]);
},200);
}

// CLICK
async function handleClick(route){

if(line) map.removeLayer(line);
if(startMarker) map.removeLayer(startMarker);
if(endMarker) map.removeLayer(endMarker);

let pts=await simulate(route);

line=L.polyline(pts,{color:"red",weight:3}).addTo(map);

startMarker=L.circleMarker(pts[0],{color:"green"}).addTo(map);
endMarker=L.circleMarker(pts[pts.length-1],{color:"red"}).addTo(map);

drawHeat(pts[pts.length-1]); // 🔥 HEAT

animate(pts);
map.fitBounds(line.getBounds());
}

// ANALIZA LIVE
function analyze(track,wind){

if(track.length<2)return{score:0};

let a=track[0];
let b=track[track.length-1];

let angle=Math.atan2(b[1]-a[1],b[0]-a[0])*180/Math.PI;
if(angle<0)angle+=360;

let diff=Math.abs(angle-wind.dir);
if(diff>180) diff=360-diff;

let score=0;

if(diff<30) score+=40;
else if(diff<70) score+=20;

if(wind.speed>15) score+=30;

return {score,angle};
}

// LIVE
async function loadLive(){

let res=await fetch("https://api.v2.sondehub.org/amateur/telemetry");
let data=await res.json();

alert.style.display="none";

for(const obj of Object.values(data)){

let id=obj.payload_callsign||Math.random();
let lat=obj.lat;
let lon=obj.lon;
let alt=obj.alt;

if(!lat||!lon||alt<100) continue;
if(lat<51||lat>56||lon<20||lon>28) continue;

if(!liveMarkers[id]){
liveMarkers[id]=L.circleMarker([lat,lon],{
radius:7,color:"white",fillColor:"cyan",fillOpacity:0.8
}).addTo(map);

liveTracks[id]=[];
}

liveMarkers[id].setLatLng([lat,lon]);
liveTracks[id].push([lat,lon]);

if(liveTracks[id].length>6) liveTracks[id].shift();

lastSeen[id]=Date.now();

// ślad
if(liveTracks[id].length>1){
L.polyline(liveTracks[id],{color:"cyan"}).addTo(map);
}

// wiatr + analiza
let wind=await getWind(lat,lon,0);
let resu=analyze(liveTracks[id],wind);

// kolor
let color="cyan";
if(resu.score>60) color="red";
else if(resu.score>30) color="yellow";

liveMarkers[id].setStyle({color,fillColor:color});

// ALERT
if(resu.score>70 && alt>5000){
alert.style.display="block";
}
}

// cleanup
Object.keys(lastSeen).forEach(id=>{
if(Date.now()-lastSeen[id]>90000){
map.removeLayer(liveMarkers[id]);
delete liveMarkers[id];
delete liveTracks[id];
delete lastSeen[id];
}
});
}

// SCORE
function score(speed){
if(speed>25)return 90;
if(speed>18)return 70;
if(speed>14)return 50;
if(speed>10)return 30;
return 10;
}

// TILES (bez zmian)
async function buildTiles(){

grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);
let sc=score(w.speed);

let color="low";
if(sc>80)color="veryhigh";
else if(sc>60)color="high";
else if(sc>40)color="medium";

let tile=document.createElement("div");
tile.className="tile "+color;

tile.innerHTML=`
<b>${r.name}</b><br>
📅 ${getDate(i)}<br>
💨 ${w.speed.toFixed(1)} km/h<br>
🌐 ${w.l}<br>
📊 ${sc}%
`;

tile.onclick=()=>handleClick(r);

grid.appendChild(tile);
}
}
}

// RAPORT (lekko poprawiony)
async function updateReport(){

let w=await getWind(53.13,26.02,0);

report.innerHTML=`
<b>🧠 RAPORT OPERACYJNY</b><br><br>
System: AKTYWNY<br>
LIVE: DZIAŁA<br><br>
Wiatr: ${w.speed.toFixed(1)} km/h<br>
Warstwy: 925 / 850 / 700 hPa<br>
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
loadLive();
}

setInterval(loadAll,20000);
loadAll();

</script>
