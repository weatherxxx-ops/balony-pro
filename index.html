<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#0b0f1a;color:white;}

.header{text-align:center;padding:8px;font-size:16px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
padding:5px;
}

.tile{
padding:7px;
border-radius:10px;
text-align:center;
font-size:10.5px;
}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{
margin:6px;
padding:10px;
border-radius:10px;
background:#1c1f2b;
font-size:12px;
}

.maps{
display:flex;
gap:6px;
padding:6px;
}

#map{height:200px;flex:1;border-radius:10px;}
iframe{flex:1;height:200px;border:none;border-radius:10px;}

#alert{
position:fixed;
bottom:40px;
left:10px;
right:10px;
background:red;
padding:10px;
border-radius:10px;
display:none;
text-align:center;
font-weight:bold;
}

#signature{
position:fixed;
bottom:5px;
right:10px;
font-size:11px;
opacity:0.4;
}
</style>
</head>

<body>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>

<div class="grid" id="grid"></div>

<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 REALNE TRAFIENIE</div>
<div id="signature">JETFLOW OPS AI • by weatherxxx</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line=null, zone=null;

const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}, end:{lat:53.13,lon:23.16} },
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}, end:{lat:53.41,lon:23.50} },
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}, end:{lat:53.41,lon:23.50} }
];

// TIME AUTO
setInterval(()=>{
let n=new Date();
document.getElementById("time").innerText=n.toLocaleString("pl-PL");
},1000);

// DATE
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND
async function getWind(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();
return{
speed:(d.hourly.windspeed_850hPa[h]+d.hourly.windspeed_700hPa[h])/2,
dir:(d.hourly.winddirection_850hPa[h]+d.hourly.winddirection_700hPa[h])/2,
src:"REAL"
};
}

// DIR
function dirStatus(windDir,route){
let target=Math.atan2(route.end.lon-route.start.lon,route.end.lat-route.start.lat)*(180/Math.PI);
if(target<0) target+=360;
let diff=Math.abs(windDir-target);
if(diff>180) diff=360-diff;

if(diff<20) return {txt:"TRAFIA",score:1};
if(diff<45) return {txt:"ODCHYŁKA",score:0.5};
return {txt:"PRZECIWNIE",score:0};
}

// SCORE (POPRAWIONY)
function score(speed,dirScore){
let s=0;

if(speed>25) s+=50;
else if(speed>18) s+=35;
else if(speed>12) s+=25;
else if(speed>8) s+=10;

s += dirScore*50;

return Math.round(s);
}

// TRAJECTORY
async function simulate(route){
let pts=[],pos={...route.start};

for(let h=0;h<10;h++){
let w=await getWind(pos.lat,pos.lon,h);
pos.lat+=w.speed*0.003*Math.cos(w.dir*Math.PI/180);
pos.lon+=w.speed*0.003*Math.sin(w.dir*Math.PI/180);
pts.push([pos.lat,pos.lon]);
}
return pts;
}

// ALERT (POPRAWIONY)
function shouldAlert(score,dir){
return score>70 && dir==="TRAFIA";
}

// TILES
async function buildTiles(){

let grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);

let d=dirStatus(w.dir,r);
let sc=score(w.speed,d.score);

// 🔥 KOLORY WRÓCIŁY
let color="low";
if(sc>75) color="veryhigh";
else if(sc>55) color="high";
else if(sc>30) color="medium";

let tile=document.createElement("div");
tile.className="tile "+color;

tile.innerHTML=`
<b>${r.name}</b><br>
${getDate(i)}<br>
💨 ${w.speed.toFixed(1)} km/h<br>
${d.txt}<br>
📊 ${sc}%
`;

tile.onclick=async()=>{

if(line) map.removeLayer(line);
if(zone) map.removeLayer(zone);

let pts=await simulate(r);

line=L.polyline(pts,{color:"red"}).addTo(map);

let last=pts[pts.length-1];

zone=L.circle(last,{radius:30000,color:"red",fillOpacity:0.25}).addTo(map);

map.fitBounds(line.getBounds());

if(shouldAlert(sc,d.txt)){
let el=document.getElementById("alert");
el.style.display="block";
setTimeout(()=>el.style.display="none",4000);
}
};

grid.appendChild(tile);
}
}
}

// RAPORT (PRZYWRÓCONY)
async function updateReport(){

let w=await getWind(53.13,26.02,0);
let d=dirStatus(w.dir,routes[0]);
let sc=score(w.speed,d.score);

document.getElementById("report").innerHTML=`
<b>🧠 RAPORT OPERACYJNY</b><br><br>
Status: ${sc>70?"SPRZYJAJĄCE":"NIE"}<br>
Wiatr: ${w.speed.toFixed(1)} km/h<br>
Kierunek: ${d.txt}<br>
Źródło: ${w.src}<br>
Trend: ${(w.speed>18)?"ROSNĄCY":"SŁABY"}<br>
Okno: ${(new Date().getHours()>=17||new Date().getHours()<=7)?"AKTYWNE 🌙":"NISKIE ☀️"}
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

setInterval(loadAll,300000);
loadAll();

</script>

</body>
</html>
