<!DOCTYPE html>
<html>
<head>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

h1 {
  text-align: center;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}
.tile {
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  font-size: 16px;
  transition: 0.3s;
}

.tile.low { background: #2ecc71; }
.tile.medium { background: #f1c40f; }
.tile.high { background: #e74c3c; }

.tile:hover {
  transform: scale(1.05);
}

.tile.active {
  outline: 3px solid white;
}

.map {
  height: 300px;
  margin: 20px;
}
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>
<body>

<h1>📡 Monitoring PRO</h1>

<div class="grid">
  <div id="day1" class="tile">Ładowanie...</div>
  <div id="day2" class="tile">Ładowanie...</div>
  <div id="day3" class="tile">Ładowanie...</div>
  <div id="day4" class="tile">Ładowanie...</div>
  <div id="day5" class="tile">Ładowanie...</div>
  <div id="day6" class="tile">Ładowanie...</div>
  <div id="day7" class="tile">Ładowanie...</div>
  <div id="day8" class="tile">Ładowanie...</div>
</div>

<div id="map" class="map"></div>
<script>

let map = L.map('map').setView([52.3, 23.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🎯 funkcja ustawiająca kafelek
function setTile(id, date, percent, risk) {
  const el = document.getElementById(id);

  let cls = "low";
  if (percent > 80) cls = "high";
  else if (percent > 40) cls = "medium";

  el.className = "tile " + cls;

  el.innerHTML = `
    <div class="tile-date">${date}</div>
    <div class="tile-percent">${percent}%</div>
    <div class="tile-risk">${risk}</div>
  `;

  // 🔥 klik = highlight + info w konsoli
  el.onclick = () => {
    document.querySelectorAll(".tile").forEach(t => t.classList.remove("active"));
    el.classList.add("active");

    console.log("Klik:", date, percent, risk);
  };
}

// 📊 dane
setTile("day1", "MAR 17", 0, "Low Risk");
setTile("day2", "MAR 18", 0, "Low Risk");
setTile("day3", "MAR 19", 0, "Low Risk");
setTile("day4", "MAR 24", 0, "Low Risk");
setTile("day5", "MAR 25", 98, "Very High Risk");
setTile("day6", "MAR 26", 78, "High Risk");
setTile("day7", "MAR 31", 56, "Low Risk");
setTile("day8", "APR 1", 93, "Very High Risk");

</script>
