<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JETFLOW OPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(rgba(11,15,26,0.9), rgba(11,15,26,0.95)),
url('https://images.unsplash.com/photo-1504198453319-5ce911bafcde');
background-size:cover;
}

h1{text-align:center;padding:20px;}

#update{text-align:center;font-size:12px;opacity:0.7;}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.tile{
padding:20px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.tile:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

.badge{
font-size:11px;
opacity:0.7;
margin-top:5px;
}

#report{
margin:20px;
padding:20px;
background:rgba(0,0,0,0.6);
border-radius:15px;
line-height:1.6;
}

.wrapper{
display:flex;
gap:10px;
padding:20px;
}

#map{height:320px;flex:1;}
</style>
</head>

<body>

<h1>🛰 JETFLOW OPS</h1>
<div id="update"></div>

<div class="grid">
<div id="day1" class="tile"></div>
<div id="day2" class="tile"></div>
<div id="day3" class="tile"></div>
<div id="day4" class="tile"></div>
<div id="day5" class="tile"></div>
<div id="day6" class="tile"></div>
<div id="day7" class="tile"></div>
<div id="day8" class="tile"></div>
</div>

<div id="report">Ładowanie analizy...</div>

<div class="wrapper">
<div id="map"></div>

<iframe width="50%" height="320"
src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind&metricWind=km%2Fh">
</iframe>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ===== MAPA =====
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let trajectoryLine=null;

// ===== LOKACJE =====
const locations=[
{ name:"Baranowicze → Białystok", lat:53.13, lon:26.02, targetLat:53.13, targetLon:23.16 },
{ name:"Baranowicze → Sokółka", lat:53.13, lon:26.02, targetLat:53.41, targetLon:23.50 }
];

// ===== FUNKCJE =====
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

function getBearing(lat1,lon1,lat2,lon2){
let y=Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180);
let x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// ===== HYBRYDA + FIX =====
async function getWindHybrid(lat,lon,i){

let index=i*24;

try{
let res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_850hPa,windspeed_700hPa,winddirection_850hPa,winddirection_700hPa`);
let data=await res.json();

if(data.hourly && data.hourly.windspeed_850hPa[index]){

let s850=data.hourly.windspeed_850hPa[index];
let s700=data.hourly.windspeed_700hPa[index];
let d850=data.hourly.winddirection_850hPa[index];
let d700=data.hourly.winddirection_700hPa[index];

return {
speed:(s850+s700)/2,
dir:(d850+d700)/2,
source:"REAL 1500–3000m"
};
}

}catch{}

// fallback
let res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_10m,winddirection_10m`);
let data=await res.json();

return {
speed:data.hourly.windspeed_10m[index]*(1.8+Math.random()*0.3),
dir:data.hourly.winddirection_10m[index],
source:"FALLBACK"
};

}

// ===== ANALIZA =====
function analyze(speed,dir,target){
let diff=Math.abs(dir-target);
if(diff>180) diff=360-diff;

if(diff<45 && speed>18) return {status:"SPRZYJAJĄCE",diff};
if(diff<90) return {status:"UMIARKOWANE",diff};
return {status:"NIEKORZYSTNE",diff};
}

// ===== TRAJEKTORIA =====
function simulateTrajectory(lat,lon,dir,speed){

let points=[[lat,lon]];

for(let i=0;i<10;i++){

let dist=speed*100; // skala

let newLat=lat + (dist*Math.cos(dir*Math.PI/180))/111000;
let newLon=lon + (dist*Math.sin(dir*Math.PI/180))/(111000*Math.cos(lat*Math.PI/180));

lat=newLat;
lon=newLon;

points.push([lat,lon]);
}

return points;
}

// ===== KAFELKI =====
async function setTile(id,i,loc){

let el=document.getElementById(id);

let wind=await getWindHybrid(loc.lat,loc.lon,i);

let target=getBearing(loc.lat,loc.lon,loc.targetLat,loc.targetLon);

let a=analyze(wind.speed,wind.dir,target);

el.className="tile medium";

el.innerHTML=`
<b>${getDate(i)}</b><br>
${loc.name}<br>
💨 ${wind.speed.toFixed(1)} km/h<br>
${a.status}<br>
<div class="badge">${wind.source}</div>
`;

el.onclick=()=>{

if(trajectoryLine) map.removeLayer(trajectoryLine);

let points=simulateTrajectory(loc.lat,loc.lon,wind.dir,wind.speed);

trajectoryLine=L.polyline(points,{color:"red"}).addTo(map);

map.fitBounds(trajectoryLine.getBounds());

};

}

// ===== RAPORT =====
async function updateReport(){

let loc=locations[0];

let w1=await getWindHybrid(loc.lat,loc.lon,0);
let w2=await getWindHybrid(loc.lat,loc.lon,1);

let trend = w1.speed > w2.speed ? "📈 wzrost" : "📉 spadek";

let target=getBearing(loc.lat,loc.lon,loc.targetLat,loc.targetLon);

let a=analyze(w1.speed,w1.dir,target);

document.getElementById("report").innerHTML=`
<b>📊 RAPORT OPERACYJNY</b><br><br>

Status: ${a.status}<br>
Trend: ${trend}<br>
Okno: ${(new Date().getHours()>=17||new Date().getHours()<=7)?"AKTYWNE 🌙":"NISKIE ☀️"}<br>
Źródło: ${w1.source}<br><br>

Odchylenie: ${Math.round(a.diff)}°<br>
Prędkość: ${w1.speed.toFixed(1)} km/h
`;

}

// ===== START =====
document.getElementById("update").innerText="Aktualizacja: "+new Date().toLocaleTimeString();

for(let i=0;i<8;i++){
let loc=i<4?locations[0]:locations[1];
setTile("day"+(i+1),i,loc);
}

updateReport();

setInterval(()=>{
updateReport();
},300000);

</script>

</body>
</html>
