<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETFLOW OPS AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:-apple-system;}
.header{text-align:center;padding:8px;background:#111;}
#time{text-align:center;font-size:11px;opacity:0.7;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:6px;}

.tile{
padding:10px;border-radius:12px;text-align:center;
font-size:12px;cursor:pointer;transition:0.2s;
}
.tile:hover{transform:scale(1.05);}

.low{background:#2ecc71;}
.medium{background:#f1c40f;}
.high{background:#e67e22;}
.veryhigh{background:#ff2ea6;}

#report{
margin:6px;padding:12px;border-radius:12px;background:#1c1f2b;
}

.maps{display:flex;gap:6px;padding:6px;}
#map{height:230px;flex:1;border-radius:12px;}
iframe{flex:1;height:230px;border:none;border-radius:12px;}

#alert{
position:fixed;bottom:40px;left:10px;right:10px;
background:red;padding:10px;border-radius:10px;
display:none;text-align:center;font-weight:bold;
}

#loginScreen{
position:fixed;width:100%;height:100%;
background:#0b0f1a;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="loginScreen">
<h2>🔒 Dostęp</h2>
<input id="login" placeholder="Login"><br><br>
<input id="pass" type="password" placeholder="Hasło"><br><br>
<button onclick="checkLogin()">Zaloguj</button>
<p id="error"></p>
</div>

<div class="header">🛰 JETFLOW OPS AI</div>
<div id="time"></div>

<div id="grid" class="grid"></div>
<div id="report"></div>

<div class="maps">
<div id="map"></div>
<iframe src="https://embed.windy.com/embed2.html?lat=53.2&lon=23.2&zoom=6&level=850h&overlay=wind"></iframe>
</div>

<div id="alert">🚨 PODEJRZANY OBIEKT</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// LOGIN
const LOGIN="PsgBobrowniki";
const PASSWORD="!Bobrowniki1";

function checkLogin(){
if(login.value===LOGIN && pass.value===PASSWORD){
loginScreen.style.display="none";
localStorage.setItem("auth","ok");
}else error.innerText="Błędne dane";
}
if(localStorage.getItem("auth")==="ok"){
loginScreen.style.display="none";
}

// MAP
let map=L.map('map').setView([53.2,23.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let line, startMarker, endMarker, animMarker;

// ROUTES
const routes=[
{ name:"Baranowicze → Białystok", start:{lat:53.13,lon:26.02}},
{ name:"Baranowicze → Sokółka", start:{lat:53.13,lon:26.02}},
{ name:"Grodno → Sokółka", start:{lat:53.67,lon:23.83}}
];

// TIME
setInterval(()=>time.innerText=new Date().toLocaleString("pl-PL"),1000);

// DATE
function getDate(i){
let d=new Date();
d.setDate(d.getDate()+i);
return d.toLocaleDateString("pl-PL");
}

// WIND
async function getWind(lat,lon,h){
let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=windspeed_925hPa,windspeed_850hPa,windspeed_700hPa,winddirection_925hPa,winddirection_850hPa,winddirection_700hPa`);
let d=await r.json();

let layers=[
{speed:d.hourly.windspeed_925hPa[h],dir:d.hourly.winddirection_925hPa[h],l:"925"},
{speed:d.hourly.windspeed_850hPa[h],dir:d.hourly.winddirection_850hPa[h],l:"850"},
{speed:d.hourly.windspeed_700hPa[h],dir:d.hourly.winddirection_700hPa[h],l:"700"}
];

layers.sort((a,b)=>b.speed-a.speed);
return layers[0];
}

// TRAJEKTORIA
async function simulate(route){

let pts=[];
let pos={...route.start};

// 🔥 START FIX
pts.push([pos.lat,pos.lon]);

for(let h=0;h<12;h++){

let w=await getWind(pos.lat,pos.lon,h);
let dir=(w.dir+180)%360;

let dist=w.speed;

let dLat=(dist*Math.cos(dir*Math.PI/180))/111;
let dLon=(dist*Math.sin(dir*Math.PI/180))/(111*Math.cos(pos.lat*Math.PI/180));

pos.lat+=dLat;
pos.lon+=dLon;

pts.push([pos.lat,pos.lon]);
}

return pts;
}

// ANIMACJA
function animate(points){

if(animMarker) map.removeLayer(animMarker);

let i=0;
animMarker=L.circleMarker(points[0],{radius:6,color:"yellow"}).addTo(map);

let interval=setInterval(()=>{
i++;
if(i>=points.length) return clearInterval(interval);
animMarker.setLatLng(points[i]);
},200);
}

// CLICK
async function handleClick(route){

if(line) map.removeLayer(line);
if(startMarker) map.removeLayer(startMarker);
if(endMarker) map.removeLayer(endMarker);

let pts=await simulate(route);

// linia
line=L.polyline(pts,{color:"red",weight:3}).addTo(map);

// START
startMarker=L.circleMarker(pts[0],{color:"green"}).addTo(map)
.bindPopup("START");

// KONIEC
endMarker=L.circleMarker(pts[pts.length-1],{color:"red"}).addTo(map)
.bindPopup("KONIEC");

// animacja
animate(pts);

map.fitBounds(line.getBounds());
}

// SCORE
function score(speed){
if(speed>25)return 90;
if(speed>18)return 70;
if(speed>14)return 50;
if(speed>10)return 30;
return 10;
}

// TILES
async function buildTiles(){

grid.innerHTML="";

for(let i=0;i<5;i++){
for(let r of routes){

let w=await getWind(r.start.lat,r.start.lon,i*24);
let sc=score(w.speed);

let color="low";
if(sc>80)color="veryhigh";
else if(sc>60)color="high";
else if(sc>40)color="medium";

let tile=document.createElement("div");
tile.className="tile "+color;

tile.innerHTML=`
<b>${r.name}</b><br>
📅 ${getDate(i)}<br>
💨 ${w.speed.toFixed(1)} km/h<br>
🌐 ${w.l} hPa<br>
📊 ${sc}%
`;

tile.onclick=()=>handleClick(r);

grid.appendChild(tile);
}
}
}

// TREND
async function getTrend(){
let w1=await getWind(53.13,26.02,0);
let w2=await getWind(53.13,26.02,3);

if(w2.speed>w1.speed)return"📈 ROŚNIE";
if(w2.speed<w1.speed)return"📉 SPADA";
return"➡ STABILNY";
}

// PROGNOZA
async function predict(){
let good=0;
for(let i=0;i<6;i++){
let w=await getWind(53.13,26.02,i);
if(w.speed>15)good++;
}
if(good>=4)return"🚀 WYSOKIE";
if(good>=2)return"⚠ MOŻLIWE";
return"❌ BRAK";
}

// OKNO
async function detectWindow(){
let good=0;
for(let i=0;i<6;i++){
let w=await getWind(53.13,26.02,i);
if(w.speed>14)good++;
}
if(good>=3)return"🌙 AKTYWNE";
return"❌ BRAK";
}

// RAPORT
async function updateReport(){

let w=await getWind(53.13,26.02,0);

let trend=await getTrend();
let prog=await predict();
let window=await detectWindow();

report.innerHTML=`
<b>🧠 RAPORT OPERACYJNY</b><br><br>
Wiatr: ${w.speed.toFixed(1)} km/h<br>
Warstwa: ${w.l} hPa<br>
Trend: ${trend}<br>
Prognoza: ${prog}<br>
Okno: ${window}
`;
}

// INIT
function loadAll(){
buildTiles();
updateReport();
}

setInterval(loadAll,60000);
loadAll();

</script>

</body>
</html>
